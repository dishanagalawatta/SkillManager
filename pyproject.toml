[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "skill-manager"
version = "1.0.0"
description = "A professional tool for managing reusable agent skills across repositories."
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "PySide6",
    "pyyaml",
    "pywinstyles",
    "posthog>=7.14.2",
    "python-dotenv>=1.2.2",
    "rapidfuzz",
]


[project.optional-dependencies]
test = [
    "pytest",
    "pytest-qt",
    "pytest-cov",
    "pytest-asyncio",
]
dev = [
    "ruff",
    "pyinstaller",
    "pillow",
]

[project.scripts]
skill-manager = "skill_manager.__main__:main"

[tool.setuptools.packages.find]
where = ["src"]
include = ["skill_manager*"]

[tool.coverage.run]
source = ["skill_manager"]
omit = ["src/skill_manager/__main__.py"]

[tool.coverage.report]
fail_under = 90
show_missing = true
skip_covered = false

[dependency-groups]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
    "pytest-cov>=5.0.0",
    "pytest-qt>=4.5.0",
    "ruff>=0.8.0",
    "pyinstaller>=6.0.0",
    "pillow>=10.0.0",
]
