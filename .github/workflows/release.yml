name: Release

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  semantic-release:
    name: Semantic Release
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') }}
    outputs:
      released: ${{ steps.release.outputs.released }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Check for [dev] token
        id: check-dev
        run: |
          LATEST_MSG=$(git log -1 --pretty=%B)
          if echo "$LATEST_MSG" | grep -q '\[dev\]'; then
            echo "dev_flag=--as-prerelease" >> $GITHUB_OUTPUT
            echo "Detected [dev] token — will create pre-release"
          else
            echo "dev_flag=" >> $GITHUB_OUTPUT
            echo "No [dev] token — will create stable release"
          fi

      - name: Semantic Release
        id: release
        uses: python-semantic-release/python-semantic-release@v10.5.3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          root_options: ${{ steps.check-dev.outputs.dev_flag }}

  build:
    name: Build
    needs: semantic-release
    if: needs.semantic-release.outputs.released == 'true'
    uses: ./.github/workflows/_build-pyinstaller.yml
    with:
      ref: v${{ needs.semantic-release.outputs.version }}

  attach-assets:
    name: Attach Assets
    needs: [semantic-release, build]
    if: needs.semantic-release.outputs.released == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          merge-multiple: true

      - name: List and verify artifacts
        run: |
          ls -R artifacts
          if [ $(find artifacts -name "*.zip" -o -name "*.exe" -o -name "*.dmg" | wc -l) -eq 0 ]; then
            echo "Warning: No build artifacts found"
          fi

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: v${{ needs.semantic-release.outputs.version }}
          files: |
            artifacts/**/*.exe
            artifacts/**/*.dmg
            artifacts/**/*.zip
          prerelease: ${{ contains(needs.semantic-release.outputs.version, '-') }}
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  tuf-publish:
    name: TUF Publish
    needs: [semantic-release, attach-assets]
    if: needs.semantic-release.outputs.released == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist

      - name: Prepare TUF signing keys
        env:
          TUF_KEY_ROOT: ${{ secrets.TUF_KEY_ROOT }}
          TUF_KEY_SNAPSHOT: ${{ secrets.TUF_KEY_SNAPSHOT }}
          TUF_KEY_TARGETS: ${{ secrets.TUF_KEY_TARGETS }}
          TUF_KEY_TIMESTAMP: ${{ secrets.TUF_KEY_TIMESTAMP }}
        run: |
          mkdir -p tuf_keys
          echo "$TUF_KEY_ROOT" > tuf_keys/root
          echo "$TUF_KEY_SNAPSHOT" > tuf_keys/snapshot
          echo "$TUF_KEY_TARGETS" > tuf_keys/targets
          echo "$TUF_KEY_TIMESTAMP" > tuf_keys/timestamp

      - name: Publish TUF release
        run: |
          uv run python scripts/publish_tuf_release.py \
            --version ${{ needs.semantic-release.outputs.version }} \
            --bundle dist/artifacts-windows

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453 # v4.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./tuf_repo
          publish_branch: gh-pages
          keep_files: true
          force_orphan: false
