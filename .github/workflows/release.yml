name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  version:
    name: Manage Version and Tags
    # Only run on main branch pushes (automated release management)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      released: ${{ steps.release.outputs.released }}
      tag: ${{ steps.release.outputs.tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Action | Semantic Version Release
        id: release
        uses: python-semantic-release/python-semantic-release@v9.19.1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          git_committer_name: "github-actions"
          git_committer_email: "actions@users.noreply.github.com"

  build:
    name: Build on ${{ matrix.os }}
    needs: version
    # Run if:
    # 1. 'version' job created a new release
    # 2. OR it was a manual tag push (v*)
    # 3. OR it was a manual workflow dispatch
    if: |
      always() && (
        needs.version.outputs.released == 'true' || 
        startsWith(github.ref, 'refs/tags/v') ||
        github.event_name == 'workflow_dispatch'
      )
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Use the tag from 'version' job if available, otherwise the current ref
          ref: ${{ needs.version.outputs.tag || github.ref }}

      - name: Install macOS Dependencies
        if: matrix.os == 'macos-latest'
        run: npm install -g create-dmg

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: uv sync

      - name: Build with PyInstaller and Package
        run: uv run python scripts/build_app.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.os }}
          path: dist/

  release:
    name: Attach Assets to Release
    needs: [version, build]
    runs-on: ubuntu-latest
    if: |
      always() && (
        needs.version.outputs.released == 'true' || 
        startsWith(github.ref, 'refs/tags/v')
      )
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List downloaded artifacts
        run: ls -R artifacts

      - name: Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # Use the tag from 'version' job if available, otherwise the current tag name
          tag_name: ${{ needs.version.outputs.tag || github.ref_name }}
          files: |
            artifacts/**/*.exe
            artifacts/**/*.dmg
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
          prerelease: true
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
