name: Build and Release

on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-trigger:
    name: Check for Release Triggers
    # Run on main or develop pushes
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    runs-on: ubuntu-latest
    outputs:
      trigger_level: ${{ steps.check.outputs.level }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Extract Trigger Level
        id: check
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B)
          echo "Commit message: $COMMIT_MSG"
          LEVEL=""
          if [[ "$COMMIT_MSG" == *"[major]"* ]]; then
            LEVEL="--major"
          elif [[ "$COMMIT_MSG" == *"[minor]"* ]]; then
            LEVEL="--minor"
          elif [[ "$COMMIT_MSG" == *"[patch]"* ]]; then
            LEVEL="--patch"
          elif [[ "$COMMIT_MSG" == *"[dev]"* ]]; then
            LEVEL="--patch --as-prerelease --prerelease-token dev"
          fi
          echo "level=$LEVEL" >> $GITHUB_OUTPUT
          echo "Detected level: $LEVEL"

  version:
    name: Manage Version and Tags
    needs: check-trigger
    # Run only if a trigger was found
    if: needs.check-trigger.outputs.trigger_level != ''
    runs-on: ubuntu-latest
    outputs:
      released: ${{ steps.release.outputs.released }}
      tag: ${{ steps.release.outputs.tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: uv sync

      - name: Run Semantic Release
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@users.noreply.github.com"
          
          # Run version command
          uv run semantic-release version ${{ needs.check-trigger.outputs.trigger_level }}
          
          # Capture outputs
          # Note: PSR creates a tag if successful. We can check for a new tag or version change.
          # For simplicity and robustness, we check if a release was actually made.
          # We can use semantic-release version --print-tag to see what the next tag would be/is.
          
          # Check if the last commit was a release commit by PSR
          LAST_MSG=$(git log -1 --pretty=%B)
          if [[ "$LAST_MSG" == *"chore(release):"* ]]; then
            echo "released=true" >> $GITHUB_OUTPUT
            TAG=$(git describe --tags --abbrev=0)
            echo "tag=$TAG" >> $GITHUB_OUTPUT
            echo "Released version: $TAG"
          else
            echo "released=false" >> $GITHUB_OUTPUT
            echo "No release made."
          fi

  build:
    name: Build on ${{ matrix.os }}
    needs: [check-trigger, version]
    # Run if:
    # 1. 'version' job created a new release
    # 2. OR it was a manual tag push (v*)
    # 3. OR it was a manual workflow dispatch
    if: |
      always() && (
        needs.version.outputs.released == 'true' || 
        startsWith(github.ref, 'refs/tags/v') ||
        github.event_name == 'workflow_dispatch'
      )
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Use the tag from 'version' job if available, otherwise the current ref
          ref: ${{ needs.version.outputs.tag || github.ref }}

      - name: Install macOS Dependencies
        if: matrix.os == 'macos-latest'
        run: npm install -g create-dmg

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: uv sync

      - name: Build with PyInstaller and Package
        run: uv run python scripts/build_app.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.os }}
          path: dist/

  release:
    name: Attach Assets to Release
    needs: [version, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: |
      always() && (
        needs.version.outputs.released == 'true' || 
        startsWith(github.ref, 'refs/tags/v')
      )
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List and Verify Artifacts
        run: |
          ls -R artifacts
          # Fail if no key artifacts were found (sanity check)
          if [ $(find artifacts -name "*.zip" -o -name "*.exe" -o -name "*.dmg" | wc -l) -eq 0 ]; then
            echo "Error: No build artifacts found in 'artifacts' directory."
            exit 1
          fi

      - name: Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # Use the tag from 'version' job if available, otherwise the current tag name
          tag_name: ${{ needs.version.outputs.tag || github.ref_name }}
          files: |
            artifacts/**/*.exe
            artifacts/**/*.dmg
            artifacts/**/*.zip
          prerelease: true
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
