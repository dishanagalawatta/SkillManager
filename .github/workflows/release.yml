name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: uv sync

      - name: Build with PyInstaller
        run: uv run pyinstaller packaging/skill_manager.spec

      # --- Windows Packaging ---
      - name: Build Inno Setup Installer (Windows)
        if: matrix.os == 'windows-latest'
        run: iscc packaging/windows/installer.iss

      # --- macOS Packaging ---
      - name: Build DMG (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          npm install -g create-dmg
          create-dmg dist/SkillManager.app dist/

      # --- Linux Packaging ---
      - name: Build AppImage (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          # Note: Real AppImage build requires more setup, simplified for template
          # Often done via appimagetool or specialized actions
          tar -czvf dist/SkillManager_Linux.tar.gz dist/SkillManager/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.os }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.tar.gz

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.exe
            artifacts/*.dmg
            artifacts/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
