name: Security Scan

on:
  workflow_call:

jobs:
  pip-audit:
    name: pip-audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install uv
        uses: astral-sh/setup-uv@8b06e0d2588c1c0e354d687146b12ad46e0f01f3 # v6.0.1
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync

      - name: Run pip-audit
        run: uv run pip-audit --desc
        continue-on-error: true
