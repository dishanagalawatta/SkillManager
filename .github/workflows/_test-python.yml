name: Test Python

on:
  workflow_call:
    inputs:
      python-version:
        description: Python version to test
        type: string
        default: "3.12"

jobs:
  test:
    name: Test (Python ${{ inputs.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install uv
        uses: astral-sh/setup-uv@6b9c6063abd6010835644d4c2e1bef4cf5cd0fca # v6.0.1
        with:
          enable-cache: true

      - name: Set up Python ${{ inputs.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        run: uv run pytest --cov=skill_manager --cov-report=xml --cov-report=term-missing -q

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # v4.6.1
        with:
          name: coverage-${{ matrix.os }}-py${{ inputs.python-version }}
          path: coverage.xml
          retention-days: 7

      - name: Enforce coverage threshold
        run: uv run coverage report --fail-under=90
