name: Security Scan

on:
  workflow_call:

jobs:
  pip-audit:
    name: pip-audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync

      # Audit third-party dependencies only. The project's own package
      # (`skill-manager`) is editable-installed via `uv sync` but is NOT
      # published to PyPI, so pip-audit cannot resolve it and would otherwise
      # fail the entire run with "Dependency not found on PyPI". `--skip-editable`
      # excludes the self-package from the audit scope. The scan is intentionally
      # informational (`continue-on-error`): transitive CVEs in build/dev tooling
      # (e.g. pillow, setuptools) are surfaced in the logs for human review
      # without red-lighting the release pipeline.
      - name: Run pip-audit
        run: uv run pip-audit --desc --skip-editable --ignore-vuln CVE-2025-69872 --ignore-vuln GHSA-qp9x-wp8f-qgjj
        continue-on-error: true
