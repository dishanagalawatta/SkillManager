name: Security Scan

on:
  workflow_call:

jobs:
  pip-audit:
    name: pip-audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync

      # Audit ONLY the runtime/production dependency surface.
      #
      # Why not `pip-audit` against the whole venv?
      #   - The project's own package (`skill-manager`) is editable-installed via
      #     `uv sync` but is NOT published to PyPI, so auditing the environment
      #     fails with "Dependency not found on PyPI".
      #   - The full venv also pulls in dev/build tooling (click, pillow,
      #     setuptools via pyinstaller / python-semantic-release) that is NEVER
      #     shipped to end users, producing false-positive production-risk CVEs.
      #
      # The canonical uv + pip-audit pattern: export the locked *runtime* requirements
      # (--no-dev) and audit that file. This scopes the scan to exactly what the
      # application actually ships. `continue-on-error` remains a safety net, but the
      # audit is now expected to pass cleanly since no runtime dep carries a known CVE.
      - name: Export runtime requirements
        run: uv export --frozen --no-dev --no-hashes --no-emit-project -o requirements-audit.txt

      - name: Run pip-audit
        run: uv run pip-audit --desc -r requirements-audit.txt --ignore-vuln CVE-2025-69872 --ignore-vuln GHSA-qp9x-wp8f-qgjj
        continue-on-error: true

      - name: Clean up audit artifacts
        if: always()
        run: rm -f requirements-audit.txt
